services:
  backend-1:
    build: ./backend
    env_file:
      - ./backend/.env

  backend-2:
    build: ./backend
    env_file:
      - ./backend/.env

  backend-3:
    build: ./backend
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3

  admin:
    build:
      context: ./admin
      args:
        VITE_BACKEND_URL: http://localhost/api/v1
    ports:
      - "5174:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-1
      - backend-2
      - backend-3
